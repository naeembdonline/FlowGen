# ============================================================================
# FLOWGEN LEAD GENERATION SAAS - NGINX REVERSE PROXY CONFIGURATION
# ============================================================================
# Production Nginx configuration for leads.fikerflow.com subdomain
# Routes frontend and backend API properly with SSL support
# ============================================================================

events {
    worker_connections 1024;
    use epoll;
}

http {
    # ============================================================================
    # RATE LIMITING - Prevent abuse
    # ============================================================================
    limit_req_zone $limit_zone {
        zone 10m;
        rate 10r/s;
    }

    # ============================================================================
    # UPSTREAM SERVERS (Docker containers)
    # ============================================================================

    # Frontend (Next.js)
    upstream frontend {
        server frontend:3000;
        keepalive 64;
    }

    # Backend API (Express)
    upstream backend {
        server backend:3001;
        keepalive 64;
    }

    # ============================================================================
    # HTTP TO HTTPS REDIRECT
    # ============================================================================
    server {
        listen 80;
        server_name leads.naeemmia.bd www.leads.naeemmia.bd;

        # Redirect all HTTP traffic to HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ============================================================================
    # HTTPS SERVER - Main Configuration
    # ============================================================================
    server {
        listen 443 ssl http2;
        server_name leads.naeemmia.bd www.leads.naeemmia.bd;

        # ============================================================================
        # SSL CERTIFICATE CONFIGURATION
        # ============================================================================

        # SSL certificate paths (update with your actual paths)
        ssl_certificate /etc/letsencrypt/live/leads.naeemmia.bd/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/leads.naeemmia.bd/privkey.pem;

        # SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        ssl_stapling_verify_client on;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ============================================================================
        # SECURITY HEADERS
        # ============================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ============================================================================
        # LOGGING
        # ============================================================================
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        # ============================================================================
        # FRONTEND ROUTE (Next.js)
        # ============================================================================
        location / {
            # Rate limiting
            limit_req zone=one burst=20 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ============================================================================
        # NEXT.js STATIC FILES (Optimized serving)
        # ============================================================================
        location /_next/static {
            proxy_pass http://frontend;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ============================================================================
        # NEXT.js IMAGES
        # ============================================================================
        location /_next/image {
            proxy_pass http://frontend;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ============================================================================
        # API ROUTES (Backend)
        # ============================================================================
        location /api/ {
            # Rate limiting for API
            limit_req zone=one burst=50 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header Access-Control-Allow-Origin "https://leads.naeemmia.bd" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            # Handle OPTIONS requests for CORS
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ============================================================================
        # HEALTH CHECK ENDPOINTS
        # ============================================================================
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        location /api/v1/health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ============================================================================
        # WEBHOOK ENDPOINTS (External services)
        # ============================================================================
        location /api/v1/messages/webhook {
            # Higher rate limit for webhooks
            limit_req zone=one burst=100 nodelay;

            proxy_pass http://backend/api/v1/messages/webhook;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts (webhooks need longer timeouts)
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ============================================================================
        # SOCKET.IO / WEBSOCKETS (Future use)
        # ============================================================================
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-ForwardedProto $scheme;
        }

        # ============================================================================
        # ASSETS AND STATIC FILES
        # ============================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ============================================================================
        # GZIP COMPRESSION
        # ============================================================================
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype font/woff application/woff2;

        # ============================================================================
        # DENY ACCESS TO SENSITIVE FILES
        # ============================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================================================================
        # SECURITY - DENY ACCESS TO HIDDEN FILES
        # ============================================================================
        location ~ /\. {
            deny all;
        }

        # ============================================================================
        # BLOCK COMMON ATTACKS
        # ============================================================================
        # Block sqlmap
        location ~* \.(sql|sql.gz|sql.tar|sql.zip|sql.bz2)$ {
            deny all;
        }

        # Block common exploit attempts
        location ~* \.(git|svn|env|htaccess|htpasswd|config)$ {
            deny all;
        }
    }
}
