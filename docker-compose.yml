# ============================================================================
# FLOWGEN LEAD GENERATION SAAS - DOCKER COMPOSE
# ============================================================================
# Complete local development environment setup
# Usage: docker-compose up -d
# ============================================================================

version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # REDIS - Job Queue & Caching
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: flowgen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - flowgen-network

  # ----------------------------------------------------------------------------
  # BACKEND API - Node.js/Express Server
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowgen-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FRONTEND_URL=http://leads.naeemmia.bd
      - SUPABASE_URL=${SUPABASE_URL:-https://lglhryyhjenjeabvhgut.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnbGhyeXloamVuamVhYnZoZ3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTQzNzcsImV4cCI6MjA5MTg5MDM3N30.fvRzBb40_6VtNX0oCbIzPmdQeYHjq81oemL2eDnyqkY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1hdXRoIn0.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnbGhyeXloamVuamVhYnZoZ3V0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjMxNDM3NywiZXhwIjoyMDkxODkwMzc3fQ}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - redis
    networks:
      - flowgen-network

  # ----------------------------------------------------------------------------
  # FRONTEND - Next.js Web Application
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowgen-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://leads.naeemmia.bd/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - flowgen-network

# ----------------------------------------------------------------------------
# VOLUMES - Persistent Data Storage
# ----------------------------------------------------------------------------
volumes:
  redis-data:
    driver: local

# ----------------------------------------------------------------------------
# NETWORKS - Service Communication
# ----------------------------------------------------------------------------
networks:
  flowgen-network:
    driver: bridge

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# Start all services:
#   docker-compose up -d
#
# Stop all services:
#   docker-compose down
#
# View logs:
#   docker-compose logs -f
#   docker-compose logs -f backend
#   docker-compose logs -f frontend
#   docker-compose logs -f redis
#
# Restart a service:
#   docker-compose restart backend
#
# Remove all data and start fresh:
#   docker-compose down -v
#
# ============================================================================
# SERVICE ACCESS POINTS
# ============================================================================
#
# Frontend (Next.js):
#   URL: http://localhost:3000
#   Container: flowgen-frontend
#
# Backend (Express API):
#   URL: http://localhost:3001
#   Health: http://localhost:3001/health
#   API Base: http://localhost:3001/api/v1
#   Container: flowgen-backend
#
# Redis:
#   Host: localhost
#   Port: 6379
#   Container: flowgen-redis
#
# ============================================================================
# SERVICE COMMUNICATION (Internal Docker Network)
# ============================================================================
#
# Frontend → Backend:
#   http://backend:3001
#
# Backend → Redis:
#   redis://redis:6379
#
# Backend → Frontend (CORS):
#   http://frontend:3000
#
# ============================================================================
# HEALTH CHECKS
# ============================================================================
#
# Backend Health:
#   curl http://localhost:3001/health
#   curl http://localhost:3001/api/v1/health
#
# Frontend Health (if implemented):
#   curl http://localhost:3000/api/health
#
# Redis Health:
#   docker exec flowgen-redis redis-cli ping
#
# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Services not starting:
#   - Check if ports 3000, 3001, 6379 are available
#   - Check logs: docker-compose logs [service-name]
#   - Verify .env file exists with required variables
#
# Connection issues:
#   - Ensure all services are on the same network
#   - Check service health: docker-compose ps
#   - Verify health checks are passing
#
# Database connection issues:
#   - Check Supabase credentials in .env
#   - Verify Supabase project is active
#   - Check backend logs for Redis connection errors
#
# Build issues:
#   - Remove node_modules: docker-compose down -v
#   - Rebuild: docker-compose build --no-cache
#   - Check Dockerfile for each service
#
# ============================================================================
