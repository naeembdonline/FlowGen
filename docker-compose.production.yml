# ============================================================================
# FLOWGEN LEAD GENERATION SAAS - PRODUCTION DOCKER COMPOSE
# ============================================================================
# Production-ready Docker setup for Linux server deployment
# Usage: docker-compose -f docker-compose.production.yml up -d
# ============================================================================

version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # REDIS - Job Queue & Caching
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: flowgen-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # Only accessible locally
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - flowgen-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # BACKEND API - Node.js/Express Server
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: flowgen-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"  # Only accessible locally
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-https://leads.naeemmia.bd}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - Z_AI_API_KEY=${Z_AI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - USE_IN_MEMORY_CACHE=false
    volumes:
      - backend-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health", "--timeout=5", "-O", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - flowgen-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # FRONTEND - Next.js Web Application
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: flowgen-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Only accessible locally
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://leads.naeemmia.bd/api/v1}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://leads.naeemmia.bd}
    volumes:
      - frontend-logs:/app/.next/logs
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/", "--timeout=5", "-O", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - flowgen-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ----------------------------------------------------------------------------
# VOLUMES - Persistent Data Storage
# ----------------------------------------------------------------------------
volumes:
  redis-data:
    driver: local
  backend-logs:
    driver: local
  frontend-logs:
    driver: local

# ----------------------------------------------------------------------------
# NETWORKS - Service Communication
# ----------------------------------------------------------------------------
networks:
  flowgen-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
#
# Start all services:
#   docker-compose -f docker-compose.production.yml up -d
#
# Stop all services:
#   docker-compose -f docker-compose.production.yml down
#
# View logs:
#   docker-compose -f docker-compose.production.yml logs -f
#   docker-compose -f docker-compose.production.yml logs -f backend
#
# Rebuild and restart:
#   docker-compose -f docker-compose.production.yml build --no-cache
#   docker-compose -f docker-compose.production.yml up -d
#
# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
#
# Required environment variables:
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   ANTHROPIC_API_KEY
#   JWT_SECRET
#
# Optional environment variables:
#   FRONTEND_URL (default: https://leads.naeemmia.bd)
#   NEXT_PUBLIC_API_URL (default: https://leads.naeemmia.bd/api/v1)
#   NEXT_PUBLIC_APP_URL (default: https://leads.naeemmia.bd)
#   Z_AI_API_KEY
#   OPENAI_API_KEY
#
# ============================================================================
